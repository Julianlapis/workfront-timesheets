# workfront-timesheets — per-user config. Copy to config.yaml and fill in.
# This is the ONLY file you should need to edit. The skill + scripts are org-neutral.

workfront:
  # Your Workfront iframe subdomain (the inner frame, not experience.adobe.com).
  # Find it: open a timesheet, inspect — the grid iframe src is https://<this>.my.workfront.adobe.com/...
  domain: "youragency.my.workfront"
  # The Adobe Experience shell URL prefix your timesheets open under.
  instance_url: "https://experience.adobe.com/#/@youragency/so:youragency-Production/workfront/"
  # The Slack channel where timesheet help/announcements land (for Phase 0 recon).
  help_channel: "#workfront-help"  # Optional — used in Phase 0 Slack recon only; leave blank to skip.

identity:
  # Your work email — used to read your own calendar RSVP and to recognize your rows.
  work_email: "you@youragency.com"
  # Your role label as it appears on timesheet rows (helps disambiguate duplicate rows). Optional.
  role_label: "Your Role Title"

evidence:
  # Base dir for Claude session transcripts (for the activity histogram).
  claude_projects_dir: "~/.claude/projects"
  timezone: "America/New_York"
  # Backfill window start (ISO date). Sessions/events before this are ignored.
  start_date: "2026-01-01"
  # Calendar event titles to filter OUT (personal/noise). Regex, pipe-delimited.
  # NOTE: this is an AGENT HINT, not script-enforced — the agent applies it while reading
  # condense_cal.py output; no script compiles this regex. WARNING: it can drop a real
  # "(no title)" work event — compare raw vs. filtered event counts and spot-check drops.
  calendar_filter: "Personal|Lunch|(no title)"
  # name=dir1,dir2 mapping of project → Claude project-dir slug(s) under claude_projects_dir.
  # (Read by the agent, which passes these to claude_activity.py as --project flags.)
  project_dirs:
    # client-a: "-Users-you-Projects-client-a,-Users-you-Projects-client-a-pitch"
    # client-b: "-Users-you-Projects-client-b"

allocation:
  # Hour targets that govern proposed splits.
  weekly_target_low: 40      # light-calendar week target
  weekly_target_high: 60     # busy/normal ceiling
  pitch_week_min: 50         # weeks on an active pitch
  leadership_hours_per_week: 6  # standing 1:1s + team/strategy meetings
  # Where leadership/1:1/meeting time logs when there's no dedicated project task row.
  leadership_fallback_row: "Company / Department Meetings"

ticketing:
  # File a support ticket when Workfront blocks you: a row that should be loggable is DISABLED,
  # a project that should be on your sheet is missing, or a submit bounces (finance/job-code error).
  # Workfront is wonky; this turns "I'm stuck" into a tracked request instead of a dead end.
  enabled: true
  # Where tickets go. The native, no-integration option is a Workfront Request queue
  # (often the same "Agency Support Queue" your ops team points you to).
  destination: "workfront_request"   # workfront_request | slack | email | none
  # destination=workfront_request → the New Request URL for your support/agency queue.
  workfront_request_url: ""          # e.g. https://experience.adobe.com/#/@org/.../requests (then New Request)
  # destination=slack → channel to post a structured blocker into.
  slack_channel: "#workfront-help"
  # destination=email → support team address.
  email: ""
  # Draft → show you → file on confirm. true files immediately (not recommended).
  auto_file: false

policy:
  # These flags are read by the AGENT (enforced via SKILL.md hard rules), not by scripts.
  # NEVER fold one project's hours onto a different real project's line. Park instead.
  # Only a designated general new-business code may hold multiple annotated pitches.
  never_fold_project_into_project: true
  # Fill + save all, show proof pack, submit only after the human approves. Never auto-submit.
  submit_only_after_review: true
  # Project → Workfront code/row mapping. Walled/absent codes get PARKED, never folded.
  # codes:
  #   client-a: "ACME-0000 - Client A Growth Code"
  #   pitch-x:  "Client X Pitch"
